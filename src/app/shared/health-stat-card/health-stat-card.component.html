<article class="stat-card" [attr.data-variant]="stat().variant">
  <div class="stat-card__head">
    <div class="stat-card__icon-wrap" aria-hidden="true">
      @switch (stat().variant) {
        @case ('calories') {
          <svg class="stat-card__svg stat-card__svg--sm" width="16" height="19" viewBox="0 0 16 19" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M8 1v3M5.5 3.5l-1.5 1.5M10.5 3.5l1.5 1.5M8 6c-2.5 2-4 4.5-4 7a4 4 0 0 0 8 0c0-2.5-1.5-5-4-7z"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        }
        @case ('sleep') {
          <svg class="stat-card__svg" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M21 14.5A7.5 7.5 0 0 1 8.5 6 7.48 7.48 0 0 1 10 2.05 9 9 0 1 0 21 14.5z"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        }
        @case ('weight') {
          <svg class="stat-card__svg" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 3v4M9 7h6M6 21h12l-1.5-12h-9L6 21z"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        }
        @case ('water') {
          <svg class="stat-card__svg stat-card__svg--water" width="18" height="19" viewBox="0 0 18 19" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M9 18c3.5 0 6-2.1 6-5.2C15 9.5 9 2 9 2S3 9.5 3 12.8C3 15.9 5.5 18 9 18z"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        }
      }
    </div>
    <button type="button" class="stat-card__menu" aria-label="Kartenmenü">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="4" cy="9" r="1.5" fill="currentColor" />
        <circle cx="9" cy="9" r="1.5" fill="currentColor" />
        <circle cx="14" cy="9" r="1.5" fill="currentColor" />
      </svg>
    </button>
  </div>

  <h2 class="stat-card__label">{{ stat().label }}</h2>

  <p class="stat-card__value-row">
    <span class="stat-card__primary">{{ stat().primaryValue }}</span>
    @if (stat().primaryUnit) {
      <span class="stat-card__unit">{{ stat().primaryUnit }}</span>
    }
  </p>

  <div class="stat-card__trend">
    <svg class="stat-card__trend-icon" width="12" height="7" viewBox="0 0 12 7" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M1 6L6 1L11 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    <span class="stat-card__trend-text">{{ stat().trendText }}</span>
  </div>
</article>
