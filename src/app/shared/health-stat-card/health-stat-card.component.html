<article class="stat-card" [attr.data-variant]="stat().variant">
  <div class="stat-card__head">
    <div class="stat-card__icon-wrap" aria-hidden="true">
      @switch (stat().variant) {
        @case ('calories') {
          <lucide-icon class="stat-card__svg stat-card__svg--sm" [img]="icons.Flame" [size]="18" aria-hidden="true" />
        }
        @case ('sleep') {
          <lucide-icon class="stat-card__svg" [img]="icons.Moon" [size]="20" aria-hidden="true" />
        }
        @case ('weight') {
          <lucide-icon class="stat-card__svg" [img]="icons.Weight" [size]="20" aria-hidden="true" />
        }
        @case ('water') {
          <lucide-icon class="stat-card__svg stat-card__svg--water" [img]="icons.Droplet" [size]="20" aria-hidden="true" />
        }
      }
    </div>
  </div>

  <h2 class="stat-card__label">{{ stat().label }}</h2>

  <p class="stat-card__value-row">
    <span class="stat-card__primary">{{ stat().primaryValue }}</span>
    @if (stat().primaryUnit) {
      <span class="stat-card__unit">{{ stat().primaryUnit }}</span>
    }
  </p>
</article>
