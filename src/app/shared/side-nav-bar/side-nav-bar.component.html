<aside class="sidenav" aria-label="Seitenleiste">
  <div class="sidenav__inner">
    <div class="sidenav__top">
      <div class="sidenav__brand-wrap">
        <a routerLink="/health" class="sidenav__brand">MobFit</a>
      </div>

      <nav class="sidenav__nav" aria-label="Hauptnavigation">
        <a
          routerLink="/my-goals"
          routerLinkActive="nav-link--active"
          [routerLinkActiveOptions]="{ exact: true }"
          ariaCurrentWhenActive="page"
          class="nav-link"
        >
          <span class="nav-link__icon" aria-hidden="true">
            <lucide-icon [img]="icons.Target" [size]="20" aria-hidden="true" />
          </span>
          <span class="nav-link__text">My Goals</span>
        </a>
        <a
          routerLink="/health"
          routerLinkActive="nav-link--active"
          [routerLinkActiveOptions]="{ exact: true }"
          ariaCurrentWhenActive="page"
          class="nav-link"
        >
          <span class="nav-link__icon" aria-hidden="true">
            <lucide-icon [img]="icons.Heart" [size]="20" aria-hidden="true" />
          </span>
          <span class="nav-link__text">Health</span>
        </a>
      </nav>
    </div>

    <div class="sidenav__bottom">
      <div class="user-card">
        <div class="user-card__avatar" aria-hidden="true"></div>
        <div class="user-card__meta">
          <span class="user-card__name">{{ userName() }}</span>
          <span class="user-card__hint">{{ userSubtitle() }}</span>
        </div>
      </div>
    </div>
  </div>
</aside>
