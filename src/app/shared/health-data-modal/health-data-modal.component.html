@if (open()) {
  <div class="hdm-overlay" (click)="onBackdropClick()" role="presentation">
    <div
      class="hdm"
      (click)="$event.stopPropagation()"
      role="dialog"
      aria-modal="true"
      aria-labelledby="hdm-title"
    >
      <header class="hdm__header">
        <div class="hdm__header-text">
          <h2 id="hdm-title" class="hdm__title">Health-Daten bearbeiten</h2>
          <p class="hdm__subtitle">Aktualisiere deine täglichen Werte für eine präzise Auswertung.</p>
        </div>
        <button type="button" class="hdm__close" (click)="close()" aria-label="Schließen">
          <lucide-icon [img]="icons.X" [size]="14" aria-hidden="true" />
        </button>
      </header>

      <div class="hdm__body">
        <div class="hdm__grid">
          <div class="hdm-field">
            <div class="hdm-field__label">
              <span class="hdm-field__icon hdm-field__icon--flame" aria-hidden="true">
                <lucide-icon [img]="icons.Flame" [size]="14" aria-hidden="true" />
              </span>
              <span class="hdm-field__label-text">Kalorien (kcal)</span>
            </div>
            <div class="hdm-field__input-wrap">
              <input
                class="hdm-field__input"
                type="text"
                inputmode="numeric"
                name="caloriesKcal"
                [(ngModel)]="form.caloriesKcal"
                autocomplete="off"
              />
            </div>
          </div>

          <div class="hdm-field">
            <div class="hdm-field__label">
              <span class="hdm-field__icon hdm-field__icon--moon" aria-hidden="true">
                <lucide-icon [img]="icons.Moon" [size]="14" aria-hidden="true" />
              </span>
              <span class="hdm-field__label-text">Schlaf (Std/Min)</span>
            </div>
            <div class="hdm-field__sleep-row">
              <div class="hdm-field__input-wrap hdm-field__input-wrap--half">
                <input
                  class="hdm-field__input"
                  type="text"
                  inputmode="numeric"
                  name="sleepHours"
                  [(ngModel)]="form.sleepHours"
                  autocomplete="off"
                />
                <span class="hdm-field__suffix">H</span>
              </div>
              <div class="hdm-field__input-wrap hdm-field__input-wrap--half">
                <input
                  class="hdm-field__input"
                  type="text"
                  inputmode="numeric"
                  name="sleepMinutes"
                  [(ngModel)]="form.sleepMinutes"
                  autocomplete="off"
                />
                <span class="hdm-field__suffix">M</span>
              </div>
            </div>
          </div>

          <div class="hdm-field">
            <div class="hdm-field__label">
              <span class="hdm-field__icon hdm-field__icon--scale" aria-hidden="true">
                <lucide-icon [img]="icons.Weight" [size]="14" aria-hidden="true" />
              </span>
              <span class="hdm-field__label-text">Gewicht (kg)</span>
            </div>
            <div class="hdm-field__input-wrap">
              <input
                class="hdm-field__input"
                type="text"
                inputmode="decimal"
                name="weightKg"
                [(ngModel)]="form.weightKg"
                autocomplete="off"
              />
            </div>
          </div>

          <div class="hdm-field">
            <div class="hdm-field__label">
              <span class="hdm-field__icon hdm-field__icon--drop" aria-hidden="true">
                <lucide-icon [img]="icons.Droplet" [size]="14" aria-hidden="true" />
              </span>
              <span class="hdm-field__label-text">Flüssigkeit (Liter)</span>
            </div>
            <div class="hdm-field__input-wrap">
              <input
                class="hdm-field__input"
                type="text"
                inputmode="decimal"
                name="waterLiters"
                [(ngModel)]="form.waterLiters"
                autocomplete="off"
              />
            </div>
          </div>
        </div>

        <div class="hdm__footer">
          <button type="button" class="hdm__btn hdm__btn--ghost" (click)="close()">Abbrechen</button>
          <button type="button" class="hdm__btn hdm__btn--primary" (click)="onSave()">Speichern</button>
        </div>
      </div>
    </div>
  </div>
}
