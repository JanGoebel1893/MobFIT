@if (open()) {
  <div class="hdm-overlay" (click)="onBackdropClick()" role="presentation">
    <div
      class="hdm"
      (click)="$event.stopPropagation()"
      role="dialog"
      aria-modal="true"
      aria-labelledby="hdm-title"
    >
      <header class="hdm__header">
        <div class="hdm__header-text">
          <h2 id="hdm-title" class="hdm__title">Health-Daten bearbeiten</h2>
          <p class="hdm__subtitle">Aktualisiere deine täglichen Werte für eine präzise Auswertung.</p>
        </div>
        <button type="button" class="hdm__close" (click)="close()" aria-label="Schließen">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
      </header>

      <div class="hdm__body">
        <div class="hdm__grid">
          <div class="hdm-field">
            <div class="hdm-field__label">
              <span class="hdm-field__icon hdm-field__icon--flame" aria-hidden="true">
                <svg width="11" height="12" viewBox="0 0 16 19" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M8 1v3M5.5 3.5l-1.5 1.5M10.5 3.5l1.5 1.5M8 6c-2.5 2-4 4.5-4 7a4 4 0 0 0 8 0c0-2.5-1.5-5-4-7z"
                    stroke="currentColor"
                    stroke-width="1.75"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
              <span class="hdm-field__label-text">Kalorien (kcal)</span>
            </div>
            <div class="hdm-field__input-wrap">
              <input
                class="hdm-field__input"
                type="text"
                inputmode="numeric"
                name="caloriesKcal"
                [(ngModel)]="form.caloriesKcal"
                autocomplete="off"
              />
            </div>
          </div>

          <div class="hdm-field">
            <div class="hdm-field__label">
              <span class="hdm-field__icon hdm-field__icon--moon" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M21 14.5A7.5 7.5 0 0 1 8.5 6 7.48 7.48 0 0 1 10 2.05 9 9 0 1 0 21 14.5z"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
              <span class="hdm-field__label-text">Schlaf (Std/Min)</span>
            </div>
            <div class="hdm-field__sleep-row">
              <div class="hdm-field__input-wrap hdm-field__input-wrap--half">
                <input
                  class="hdm-field__input"
                  type="text"
                  inputmode="numeric"
                  name="sleepHours"
                  [(ngModel)]="form.sleepHours"
                  autocomplete="off"
                />
                <span class="hdm-field__suffix">H</span>
              </div>
              <div class="hdm-field__input-wrap hdm-field__input-wrap--half">
                <input
                  class="hdm-field__input"
                  type="text"
                  inputmode="numeric"
                  name="sleepMinutes"
                  [(ngModel)]="form.sleepMinutes"
                  autocomplete="off"
                />
                <span class="hdm-field__suffix">M</span>
              </div>
            </div>
          </div>

          <div class="hdm-field">
            <div class="hdm-field__label">
              <span class="hdm-field__icon hdm-field__icon--scale" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M12 3v4M9 7h6M6 21h12l-1.5-12h-9L6 21z"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
              <span class="hdm-field__label-text">Gewicht (kg)</span>
            </div>
            <div class="hdm-field__input-wrap">
              <input
                class="hdm-field__input"
                type="text"
                inputmode="decimal"
                name="weightKg"
                [(ngModel)]="form.weightKg"
                autocomplete="off"
              />
            </div>
          </div>

          <div class="hdm-field">
            <div class="hdm-field__label">
              <span class="hdm-field__icon hdm-field__icon--drop" aria-hidden="true">
                <svg width="11" height="13" viewBox="0 0 18 19" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M9 18c3.5 0 6-2.1 6-5.2C15 9.5 9 2 9 2S3 9.5 3 12.8C3 15.9 5.5 18 9 18z"
                    stroke="currentColor"
                    stroke-width="1.75"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
              <span class="hdm-field__label-text">Flüssigkeit (Liter)</span>
            </div>
            <div class="hdm-field__input-wrap">
              <input
                class="hdm-field__input"
                type="text"
                inputmode="decimal"
                name="waterLiters"
                [(ngModel)]="form.waterLiters"
                autocomplete="off"
              />
            </div>
          </div>
        </div>

        <div class="hdm__footer">
          <button type="button" class="hdm__btn hdm__btn--ghost" (click)="close()">Abbrechen</button>
          <button type="button" class="hdm__btn hdm__btn--primary" (click)="onSave()">Speichern</button>
        </div>
      </div>
    </div>
  </div>
}
