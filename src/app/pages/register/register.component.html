<div class="register-page">
  <div class="register-card">
    <div class="register-hero" aria-hidden="false">
      <div class="register-hero__image" aria-hidden="true"></div>
      <div class="register-hero__gradient"></div>
      <div class="register-hero__content">
        <h2 class="register-hero__title">Elevate your baseline.</h2>
        <p class="register-hero__text">
          Join the sanctuary where kinetic energy meets premium data tracking. Start your journey today.
        </p>
        <div class="register-hero__stats">
          <div class="register-hero__stat">
            <span class="register-hero__stat-value">12k+</span>
            <span class="register-hero__stat-label">Active athletes</span>
          </div>
          <div class="register-hero__stat">
            <span class="register-hero__stat-value">98%</span>
            <span class="register-hero__stat-label">Goal success</span>
          </div>
        </div>
      </div>
    </div>

    <div class="register-panel">
      <form class="register-form" (ngSubmit)="onSubmit($event)">
        <header class="register-form__intro">
          <h1 class="register-form__title">Create Account</h1>
        </header>

        <div class="register-form__fields">
          <div class="register-form__field">
            <label class="register-form__label" for="reg-username">Username</label>
            <div class="register-form__input-wrap">
              <input
                id="reg-username"
                name="username"
                type="text"
                class="register-form__input"
                placeholder="e.g. alex_kinetic"
                [(ngModel)]="username"
                autocomplete="username"
                required
                minlength="2"
                maxlength="64"
                aria-required="true"
              />
              <span class="register-form__input-icon" aria-hidden="true">
                <lucide-icon [img]="icons.User" [size]="16" aria-hidden="true" />
              </span>
            </div>
          </div>

          <div class="register-form__field">
            <label class="register-form__label" for="reg-email">E-Mail</label>
            <div class="register-form__input-wrap">
              <input
                id="reg-email"
                name="email"
                type="email"
                class="register-form__input"
                placeholder="name@example.com"
                [(ngModel)]="email"
                autocomplete="email"
                required
                aria-required="true"
              />
              <span class="register-form__input-icon" aria-hidden="true">
                <lucide-icon [img]="icons.Mail" [size]="16" aria-hidden="true" />
              </span>
            </div>
          </div>

          <div class="register-form__field">
            <label class="register-form__label" for="reg-password">Password</label>
            <div class="register-form__input-wrap">
              <input
                id="reg-password"
                name="password"
                type="password"
                class="register-form__input"
                placeholder="••••••••"
                [(ngModel)]="password"
                autocomplete="new-password"
                required
                [minlength]="passwordMinLength"
                aria-required="true"
                [attr.aria-describedby]="'reg-password-hint'"
              />
              <span class="register-form__input-icon" aria-hidden="true">
                <lucide-icon [img]="icons.Lock" [size]="16" aria-hidden="true" />
              </span>
            </div>
            <p id="reg-password-hint" class="register-form__hint">
              Mindestens {{ passwordMinLength }} Zeichen.
            </p>
          </div>

          <div class="register-form__row-2">
            <div class="register-form__field">
              <label class="register-form__label" for="reg-age">Alter</label>
              <input
                id="reg-age"
                name="age"
                type="number"
                class="register-form__input"
                placeholder="25"
                [(ngModel)]="age"
                min="1"
                max="120"
                step="1"
                inputmode="numeric"
                required
                aria-required="true"
              />
            </div>
            <div class="register-form__field">
              <label class="register-form__label" for="reg-height">Größe (cm)</label>
              <input
                id="reg-height"
                name="heightCm"
                type="number"
                class="register-form__input"
                placeholder="180"
                [(ngModel)]="heightCm"
                min="50"
                max="300"
                step="1"
                inputmode="numeric"
                required
                aria-required="true"
              />
            </div>
          </div>

          <label class="register-form__terms">
            <input
              type="checkbox"
              name="terms"
              [(ngModel)]="agreeTerms"
              required
              aria-required="true"
            />
            <span class="register-form__terms-text">
              I agree to the
              <a href="#" class="register-form__inline-link" (click)="$event.preventDefault()">Terms of Service</a>
              and
              <a href="#" class="register-form__inline-link" (click)="$event.preventDefault()">Privacy Policy</a>.
            </span>
          </label>

          <button type="submit" class="register-form__submit" [disabled]="!isRegisterFormValid">
            Register
          </button>
        </div>

        <p class="register-form__footer">
          Already have an account?
          <a routerLink="/login" class="register-form__link">Login</a>
        </p>
      </form>
    </div>
  </div>
</div>
