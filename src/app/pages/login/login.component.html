<div class="login-page">
  <div class="login-page__blob login-page__blob--blue" aria-hidden="true"></div>
  <div class="login-page__blob login-page__blob--green" aria-hidden="true"></div>

  <div class="login-card">
    <div class="login-hero">
      <div
        class="login-hero__image"
        role="img"
        aria-label="MobFit Lifestyle"
      ></div>
      <div class="login-hero__overlay"></div>
      <div class="login-hero__content">
        <p class="login-hero__watermark">MobFit Lifestyle</p>
        <h1 class="login-hero__brand">MobFit</h1>
        <p class="login-hero__tagline">
          Experience the Kinetic Sanctuary. Your performance, curated and elevated.
        </p>
      </div>
    </div>

    <div class="login-panel">
      <form class="login-form" (ngSubmit)="onSubmit($event)" novalidate>
        <header class="login-form__intro">
          <h2 class="login-form__title">Welcome Back</h2>
        </header>

        <div class="login-form__fields">
          <div class="login-form__field">
            <label class="login-form__label" for="login-email">E-Mail</label>
            <input
              id="login-email"
              name="email"
              type="email"
              class="login-form__input"
              placeholder="name@example.com"
              [(ngModel)]="email"
              autocomplete="email"
              required
              aria-required="true"
            />
          </div>

          <div class="login-form__field">
            <label class="login-form__label" for="login-password">Password</label>
            <input
              id="login-password"
              name="password"
              type="password"
              class="login-form__input"
              placeholder="••••••••"
              [(ngModel)]="password"
              autocomplete="current-password"
              required
              aria-required="true"
            />
          </div>

          @if (errorMessage) {
            <p class="login-form__error" role="alert">{{ errorMessage }}</p>
          }

          <button type="submit" class="login-form__submit" [disabled]="!isLoginFormValid || isLoading">
            Login
          </button>
        </div>

        <p class="login-form__footer">
          New to MobFIT?
          <a routerLink="/register" class="login-form__link">Create an account</a>
        </p>
      </form>
    </div>
  </div>
</div>
