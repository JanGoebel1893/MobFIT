<div class="dashboard-shell dashboard-shell--legal">
  <app-goals-top-nav [pageTitle]="'Health Dashboard'" />
  <div class="legal-route__scroll">
    <div class="legal-route__content">
      <div class="health-page">
        <section class="health" aria-labelledby="health-heading">
          <div class="health-hero">
            <div class="health-hero__text">
              <h2 id="health-heading" class="health-hero__headline">Übersicht</h2>
            </div>
            <div class="health-hero__actions">
              <button type="button" class="health-hero__btn health-hero__btn--add" (click)="openHealthDataModal()">
                <svg class="health-hero__icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14M5 12h14" stroke="#1e1e1e" stroke-width="3.5" stroke-linecap="round" />
                </svg>
                Hinzufügen
              </button>
            </div>
          </div>

          <div class="health__bento" role="list">
            @for (s of stats; track s.label) {
              <div class="health__cell" role="listitem">
                <app-health-stat-card [stat]="s" />
              </div>
            }
          </div>
        </section>

        <app-weekly-progress-card class="health-weekly" />
      </div>
    </div>
  </div>
  <app-dashboard-footer />

  <app-health-data-modal
    [open]="showHealthDataModal"
    (closed)="closeHealthDataModal()"
    (save)="onHealthDataSave($event)"
  />
</div>
