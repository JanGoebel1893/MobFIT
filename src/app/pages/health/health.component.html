<section class="health" aria-labelledby="health-heading">
  <h1 id="health-heading" class="health__title">Health</h1>

  <div class="health__bento" role="list">
    @for (s of stats; track s.label) {
      <div class="health__cell" role="listitem">
        <app-health-stat-card [stat]="s" />
      </div>
    }
  </div>
</section>
