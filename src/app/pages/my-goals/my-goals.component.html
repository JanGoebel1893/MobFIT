<div class="dashboard-shell dashboard-shell--legal">
  <app-goals-top-nav [pageTitle]="'My Goals Dashboard'" />
  <div class="legal-route__scroll">
    <div class="legal-route__content">
      <div class="goals-page">
        <section class="goals-hero" aria-labelledby="goals-hero-heading">
          <div class="goals-hero__text">
            <p class="goals-hero__eyebrow">Tagesübersicht</p>
            <h2 id="goals-hero-heading" class="goals-hero__headline">{{quote()}}</h2>
          </div>
          <div class="goals-hero__actions">
            <button type="button" class="goals-hero__btn goals-hero__btn--goals" (click)="openSetGoalsModal()">
              <lucide-icon class="goals-hero__icon" [img]="icons.Pencil" [size]="18" aria-hidden="true" />
              Goals
            </button>
            <button type="button" class="goals-hero__btn goals-hero__btn--add" (click)="openProgressModal()">
              <lucide-icon class="goals-hero__icon" [img]="icons.Plus" [size]="18" aria-hidden="true" />
              Hinzufügen
            </button>
          </div>
        </section>

        <div class="goals-bento" role="list">
          @for (tile of tiles; track tile.label) {
            <div class="goals-bento__cell" role="listitem">
              <app-health-metric-card [tile]="tile" />
            </div>
          }
        </div>

        <app-weekly-progress-card
          class="goals-weekly"
          [showFilters]="true"
          [metricOptions]="weeklyMetricOptions"
          [showRangeToggle]="true"
          [range]="statsRange()"
          [daysByMetric]="chartWeek()"
          [daysByMetricMonth]="chartMonth()"
          (rangeChange)="setStatsRange($event)"
        />
      </div>
    </div>
  </div>
  <app-dashboard-footer />

  <app-goals-metric-modal
    [open]="modal !== 'off'"
    [variant]="modal === 'addProgress' ? 'addProgress' : 'setGoals'"
    [initialValues]="setGoalsValues()"
    (closed)="closeModal()"
    (setGoalsSubmit)="onSetGoalsSubmit($event)"
    (progressAdd)="onProgressAdd($event)"
  />
</div>
